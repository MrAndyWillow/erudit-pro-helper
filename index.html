<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Эрудит Pro">
    <title>Помощник Эрудита Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.24.4/babel.min.js"></script>
    
    <style>
      body { background-color: #0f172a; color: #e2e8f0; overscroll-behavior-y: none; }
      /* Скрываем стрелки у number input */
      input[type=number]::-webkit-inner-spin-button, 
      input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
      input[type=number] { -moz-appearance: textfield; }
      
      .tile-shadow { box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3), inset 0 2px 0 0 rgba(255,255,255,0.2); }
      .animate-fade-in-down { animation: fadeInDown 0.3s ease-out forwards; }
      @keyframes fadeInDown {
          from { opacity: 0; transform: translateY(-10px); }
          to { opacity: 1; transform: translateY(0); }
      }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useMemo, useRef } = React;

        const SCRABBLE_POINTS = {
          'а': 1, 'в': 1, 'е': 1, 'и': 1, 'н': 1, 'о': 1, 'р': 1, 'с': 1, 'т': 1,
          'д': 2, 'к': 2, 'л': 2, 'м': 2, 'п': 2, 'у': 2,
          'б': 3, 'г': 3, 'ё': 3, 'ь': 3, 'я': 3,
          'й': 4, 'ы': 4,
          'ж': 5, 'з': 5, 'х': 5, 'ц': 5, 'ч': 5,
          'ш': 8, 'э': 8, 'ю': 8,
          'ф': 10, 'щ': 10, 'ъ': 10
        };

        const Icons = {
          Search: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>,
          Info: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
          Sort: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="15" y1="18" x2="9" y2="18"></line><line x1="18" y1="14" x2="6" y2="14"></line><line x1="21" y1="10" x2="3" y2="10"></line><line x1="24" y1="6" x2="0" y2="6"></line></svg>,
          Loader: () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>,
          ChevronDown: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>,
          ChevronUp: () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>,
          Minus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Plus: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
          Upload: () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        };

        const GameTile = ({ char, isJoker, className = "" }) => (
          <div className={`relative flex items-center justify-center w-8 h-8 sm:w-10 sm:h-10 rounded shadow-md text-sm sm:text-lg font-bold uppercase select-none tile-shadow ${className}
            ${isJoker 
              ? 'bg-slate-700 text-blue-300' 
              : 'bg-[#f4d3a0] text-[#5c3e1e]'
            }`}
          >
            {char}
            {!isJoker && SCRABBLE_POINTS[char] > 0 && (
              <span className="absolute bottom-[2px] right-[4px] text-[9px] sm:text-[10px] font-normal opacity-80 leading-none">
                {SCRABBLE_POINTS[char]}
              </span>
            )}
          </div>
        );

        const Calculator = ({ item }) => {
          const [letterMults, setLetterMults] = useState(item.tiles.map(() => 1));
          const [wordMults, setWordMults] = useState({ x2: 0, x3: 0 });
          const [isBingo, setIsBingo] = useState(false);

          const cycleLetterMult = (index) => {
            setLetterMults(prev => {
              const next = [...prev];
              next[index] = next[index] === 1 ? 2 : (next[index] === 2 ? 3 : 1);
              return next;
            });
          };

          const updateWordMult = (type, delta) => {
            setWordMults(prev => {
              const newVal = prev[type] + delta;
              if (newVal >= 0 && newVal <= 4) return { ...prev, [type]: newVal };
              return prev;
            });
          };

          const totalScore = useMemo(() => {
            let score = 0;
            item.tiles.forEach((t, i) => {
              const base = t.isJoker ? 0 : (SCRABBLE_POINTS[t.char] || 0);
              score += base * letterMults[i];
            });
            for (let i = 0; i < wordMults.x2; i++) score *= 2;
            for (let i = 0; i < wordMults.x3; i++) score *= 3;
            if (isBingo) score += 15;
            return score;
          }, [item, letterMults, wordMults, isBingo]);

          return (
            <div className="mt-3 p-4 bg-slate-950 rounded-xl border border-slate-700 shadow-inner animate-fade-in-down">
              <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-5 gap-4">
                <div className="text-sm text-slate-400">
                  Кликайте по клеткам под буквами, чтобы задать бонусы <b>х2 Буква</b> или <b>х3 Буква</b>.
                </div>
                <div className="flex items-center gap-2 bg-blue-900/30 px-4 py-2 rounded-lg border border-blue-800/50">
                  <span className="text-slate-300 font-medium">Итог:</span>
                  <span className="text-2xl font-bold text-blue-400">{totalScore}</span>
                </div>
              </div>

              <div className="flex flex-wrap gap-1 sm:gap-2 mb-6 p-3 bg-slate-900 rounded-lg overflow-x-auto pb-4 justify-center">
                {item.tiles.map((t, i) => {
                  let bgClass = "bg-slate-800 border-slate-700";
                  let label = "";
                  if (letterMults[i] === 2) { bgClass = "bg-[#82c94e] border-[#68a63b]"; label = "x2"; }
                  if (letterMults[i] === 3) { bgClass = "bg-[#5db6e6] border-[#4495c2]"; label = "x3"; }

                  return (
                    <div key={i} className="flex flex-col items-center gap-1 cursor-pointer" onClick={() => cycleLetterMult(i)}>
                      <div className="h-4 text-[10px] font-bold text-slate-300">{label}</div>
                      <div className={`p-1 rounded-md border-b-4 transition-colors ${bgClass}`}>
                        <GameTile char={t.char} isJoker={t.isJoker} />
                      </div>
                    </div>
                  );
                })}
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div className="space-y-3">
                  <div className="flex items-center justify-between p-3 rounded-lg bg-[#f8b348]/20 border border-[#f8b348]/30">
                    <span className="text-[#f8b348] font-bold flex items-center gap-2">
                      <div className="w-4 h-4 rounded bg-[#f8b348]"></div> x2 Слово
                    </span>
                    <div className="flex items-center gap-3">
                      <button onClick={() => updateWordMult('x2', -1)} className="p-1.5 rounded-md bg-slate-800 text-slate-300 hover:bg-slate-700"><Icons.Minus /></button>
                      <span className="text-lg font-bold w-4 text-center">{wordMults.x2}</span>
                      <button onClick={() => updateWordMult('x2', 1)} className="p-1.5 rounded-md bg-slate-800 text-slate-300 hover:bg-slate-700"><Icons.Plus /></button>
                    </div>
                  </div>

                  <div className="flex items-center justify-between p-3 rounded-lg bg-[#dd5347]/20 border border-[#dd5347]/30">
                    <span className="text-[#dd5347] font-bold flex items-center gap-2">
                      <div className="w-4 h-4 rounded bg-[#dd5347]"></div> x3 Слово
                    </span>
                    <div className="flex items-center gap-3">
                      <button onClick={() => updateWordMult('x3', -1)} className="p-1.5 rounded-md bg-slate-800 text-slate-300 hover:bg-slate-700"><Icons.Minus /></button>
                      <span className="text-lg font-bold w-4 text-center">{wordMults.x3}</span>
                      <button onClick={() => updateWordMult('x3', 1)} className="p-1.5 rounded-md bg-slate-800 text-slate-300 hover:bg-slate-700"><Icons.Plus /></button>
                    </div>
                  </div>
                </div>

                <div className="flex flex-col justify-center">
                  <label className="flex items-center gap-3 p-4 rounded-lg bg-slate-800 border border-slate-700 cursor-pointer hover:bg-slate-750 transition-colors h-full">
                    <div className="relative flex-shrink-0">
                      <input type="checkbox" className="sr-only" checked={isBingo} onChange={(e) => setIsBingo(e.target.checked)} />
                      <div className={`block w-10 h-6 rounded-full transition-colors ${isBingo ? 'bg-blue-500' : 'bg-slate-600'}`}></div>
                      <div className={`dot absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform ${isBingo ? 'transform translate-x-4' : ''}`}></div>
                    </div>
                    <div>
                      <div className="font-bold text-white">Бинго! (+15 очков)</div>
                      <div className="text-xs text-slate-400 mt-0.5">Использованы все 7 букв с руки</div>
                    </div>
                  </label>
                </div>
              </div>
            </div>
          );
        };

        function App() {
          const [dictionary, setDictionary] = useState([]);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [dictionaryType, setDictionaryType] = useState('nouns');
          
          const fileInputRef = useRef(null);

          const [letters, setLetters] = useState('');
          const [mask, setMask] = useState('');
          const [minLength, setMinLength] = useState('');
          const [maxLength, setMaxLength] = useState('');
          const [sortBy, setSortBy] = useState('points');
          
          const [showInstructions, setShowInstructions] = useState(false);
          const [visibleCount, setVisibleCount] = useState(50);
          const [expandedWordIdx, setExpandedWordIdx] = useState(null);

          useEffect(() => {
            if (dictionaryType === 'custom') return;

            setLoading(true);
            setError(null);
            
            // ТЕПЕРЬ ФАЙЛЫ ГРУЗЯТСЯ ЛОКАЛЬНО!
            // Путь относителен к index.html (файлы должны лежать рядом)
            const dictUrl = dictionaryType === 'nouns' 
              ? './russian_nouns.txt'
              : './russian_words.txt';

            fetch(dictUrl)
              .then(response => {
                if (!response.ok) {
                   throw new Error(`Не удалось найти локальный файл: ${dictUrl}`);
                }
                return response.text();
              })
              .then(text => {
                const words = text.split('\n')
                  .map(w => w.trim().toLowerCase())
                  .filter(w => w.length > 1 && /^[а-яё]+$/.test(w));
                setDictionary(words);
                setLoading(false);
              })
              .catch(err => {
                 setDictionary(['эрудит', 'игра', 'слова', 'помощник', 'ошибка', 'локальный', 'файл', 'настройка']);
                 setError(`Ошибка: ${err.message}. Убедитесь, что файлы russian_nouns.txt и russian_words.txt лежат в одной папке с index.html на сервере.`);
                 setLoading(false);
              });
          }, [dictionaryType]);

          const handleFileUpload = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            setLoading(true);
            const reader = new FileReader();
            
            reader.onload = (event) => {
              const text = event.target.result;
              const words = text.split('\n')
                .map(w => w.trim().toLowerCase())
                .filter(w => w.length > 1 && /^[а-яё]+$/.test(w));
                
              if (words.length === 0) {
                 setError('Файл пуст или не содержит русских слов.');
                 setLoading(false);
                 return;
              }
              
              setDictionary(words);
              setDictionaryType('custom'); // Переводим в кастомный режим
              setError(`Успешно загружен свой словарь: ${words.length.toLocaleString('ru-RU')} слов.`);
              setLoading(false);
            };
            
            reader.onerror = () => {
              setError('Произошла ошибка при чтении файла.');
              setLoading(false);
            };
            
            reader.readAsText(file);
          };

          const getWordTiles = (word, totalAvailableChars) => {
            if (!totalAvailableChars) return word.split('').map(c => ({ char: c, isJoker: false }));
            let pool = totalAvailableChars.replace(/[*?\s]/g, '').split('');
            return word.split('').map(c => {
              const idx = pool.indexOf(c);
              if (idx !== -1) {
                pool.splice(idx, 1);
                return { char: c, isJoker: false }; 
              } else {
                return { char: c, isJoker: true };  
              }
            });
          };

          const calculateBasePoints = (tiles) => {
            return tiles.reduce((sum, tile) => sum + (tile.isJoker ? 0 : (SCRABBLE_POINTS[tile.char] || 0)), 0);
          };

          const results = useMemo(() => {
            if (!letters.trim() && !mask.trim()) return [];

            let filtered = [];
            let regex = null;

            if (mask.trim()) {
              const cleanMask = mask.toLowerCase().replace(/[^а-яё*?\s-]/g, '');
              let regexStr = '^' + cleanMask.replace(/[?\s-]/g, '.').replace(/\*/g, '.*') + '$';
              try { regex = new RegExp(regexStr); } catch (e) { return []; }
            }

            const handChars = letters.toLowerCase().replace(/[^а-яё*?\s]/g, '');
            const boardChars = mask.toLowerCase().replace(/[*?\s-]/g, '');
            const totalAvailableChars = (letters.trim() ? handChars + boardChars : null);

            let jokersCount = 0;
            let baseLetterCounts = new Int16Array(33); 
            
            const charToIndex = (char) => {
                if (char === 'ё') return 32;
                const code = char.charCodeAt(0) - 1072; 
                return (code >= 0 && code <= 31) ? code : -1;
            };

            if (totalAvailableChars !== null) {
              jokersCount = (totalAvailableChars.match(/[*?\s]/g) || []).length;
              for (let c of totalAvailableChars.replace(/[*?\s]/g, '')) {
                const idx = charToIndex(c);
                if (idx !== -1) baseLetterCounts[idx]++;
              }
            }

            const minLen = parseInt(minLength) || 0;
            const maxLen = parseInt(maxLength) || 100;

            for (let i = 0; i < dictionary.length; i++) {
              const word = dictionary[i];
              if (word.length < minLen || word.length > maxLen) continue;
              if (regex && !regex.test(word)) continue;

              if (totalAvailableChars !== null) {
                let tempCounts = new Int16Array(baseLetterCounts);
                let availableJokers = jokersCount;
                let possible = true;

                for (let j = 0; j < word.length; j++) {
                  const idx = charToIndex(word[j]);
                  if (idx !== -1) {
                    if (tempCounts[idx] > 0) { tempCounts[idx]--; }
                    else if (availableJokers > 0) { availableJokers--; }
                    else { possible = false; break; }
                  } else { possible = false; break; }
                }
                if (!possible) continue;
              }

              const tiles = getWordTiles(word, totalAvailableChars);
              const points = calculateBasePoints(tiles);

              filtered.push({ word, tiles, points, length: word.length });
            }

            filtered.sort((a, b) => {
              if (sortBy === 'points') {
                if (b.points !== a.points) return b.points - a.points;
                return a.word.localeCompare(b.word);
              }
              if (sortBy === 'length') {
                if (b.length !== a.length) return b.length - a.length;
                return b.points - a.points;
              }
              if (sortBy === 'alpha') return a.word.localeCompare(b.word);
              return 0;
            });

            return filtered;
          }, [letters, mask, minLength, maxLength, sortBy, dictionary]);

          useEffect(() => {
            setVisibleCount(50);
            setExpandedWordIdx(null);
          }, [letters, mask, minLength, maxLength, sortBy]);

          return (
            <div className="min-h-screen font-sans p-3 sm:p-6 lg:p-8 pb-32">
              <div className="max-w-6xl mx-auto space-y-6">
                
                <header className="flex flex-col sm:flex-row items-center justify-between bg-slate-900 p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-800 gap-4">
                  <div className="flex items-center space-x-3 w-full sm:w-auto">
                    <div className="flex">
                      <GameTile char="Э" className="mr-[2px]" />
                      <GameTile char="Р" className="mr-[2px]" />
                      <GameTile char="У" />
                    </div>
                    <h1 className="text-xl sm:text-2xl font-bold tracking-tight text-white">Эрудит Pro</h1>
                  </div>
                  <button onClick={() => setShowInstructions(!showInstructions)} className="flex items-center space-x-2 text-sm font-medium text-slate-400 hover:text-blue-400 w-full sm:w-auto justify-center sm:justify-start">
                    <Icons.Info /><span>Правила и Подсказки</span>
                  </button>
                </header>

                {showInstructions && (
                  <div className="bg-slate-800 border border-slate-700 rounded-2xl p-5 text-sm sm:text-base text-slate-300 animate-fade-in-down">
                    <h3 className="font-semibold mb-3 text-white text-lg">Как пользоваться помощником?</h3>
                    <div className="grid sm:grid-cols-2 gap-6">
                      <ul className="list-disc list-inside space-y-2">
                        <li><strong>Мои буквы:</strong> Введите буквы, которые есть у вас. Пустая фишка (джокер) = <code className="bg-slate-950 px-1 rounded text-blue-400">*</code>.</li>
                        <li><strong>Маска:</strong> Поиск с учетом доски. Введите известные буквы на местах.</li>
                        <li>Символ <code className="bg-slate-950 px-1 rounded text-blue-400">?</code> в маске = ровно 1 любая буква.</li>
                        <li>Символ <code className="bg-slate-950 px-1 rounded text-blue-400">*</code> в маске = любое количество букв.</li>
                      </ul>
                      <div className="bg-slate-900 p-4 rounded-lg border border-slate-700">
                        <strong className="block text-white mb-2">Калькулятор очков:</strong>
                        <p className="text-slate-400 text-sm">
                          Найдите подходящее слово, кликните по нему и настройте множители. Приложение само рассчитает итоговую сумму по правилам "Эрудита" (включая бонус +15 за 7 букв).
                        </p>
                      </div>
                    </div>
                  </div>
                )}

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                  
                  {/* Левая панель - Фильтры */}
                  <div className="lg:col-span-4 space-y-4">
                    <div className="bg-slate-900 p-5 sm:p-6 rounded-2xl shadow-sm border border-slate-800 space-y-5 sticky top-6">
                      
                      <div className="space-y-1.5">
                        <label className="block text-sm font-semibold text-slate-300">Мои буквы</label>
                        <input type="text" value={letters} onChange={e => setLetters(e.target.value)} placeholder="Например: авпрсло*" className="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none uppercase placeholder-slate-600 transition-shadow" />
                      </div>

                      <div className="space-y-1.5">
                        <label className="block text-sm font-semibold text-slate-300">Маска на доске</label>
                        <input type="text" value={mask} onChange={e => setMask(e.target.value)} placeholder="Например: к?т или *о*" className="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none uppercase placeholder-slate-600 transition-shadow" />
                      </div>

                      <div className="grid grid-cols-2 gap-4">
                        <div className="space-y-1.5">
                          <label className="block text-sm font-semibold text-slate-300">Длина: От</label>
                          <input type="number" value={minLength} onChange={e => setMinLength(e.target.value)} min="1" className="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none text-center" />
                        </div>
                        <div className="space-y-1.5">
                          <label className="block text-sm font-semibold text-slate-300">Длина: До</label>
                          <input type="number" value={maxLength} onChange={e => setMaxLength(e.target.value)} min="1" className="w-full px-4 py-3 rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none text-center" />
                        </div>
                      </div>

                      <div className="space-y-1.5">
                        <label className="block text-sm font-semibold text-slate-300">Сортировка</label>
                        <div className="relative">
                          <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="w-full pl-10 pr-4 py-3 appearance-none rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none">
                            <option value="points">По базовым очкам</option>
                            <option value="length">По длине слова</option>
                            <option value="alpha">По алфавиту</option>
                          </select>
                          <div className="absolute left-3 top-3.5 text-slate-500"><Icons.Sort /></div>
                        </div>
                      </div>

                      <div className="space-y-1.5">
                        <label className="block text-sm font-semibold text-slate-300">База слов</label>
                        <div className="relative mb-3">
                          <select 
                            value={dictionaryType} 
                            onChange={e => {
                                if (e.target.value !== 'custom') setDictionaryType(e.target.value);
                            }} 
                            className="w-full pl-4 pr-10 py-3 appearance-none rounded-xl bg-slate-950 border border-slate-700 text-white focus:ring-2 focus:ring-blue-500 outline-none text-sm"
                          >
                            <option value="nouns">Существительные (~50 тыс.)</option>
                            <option value="full">Все части речи (~340 тыс.)</option>
                            {dictionaryType === 'custom' && <option value="custom">Свой загруженный словарь</option>}
                          </select>
                          <div className="absolute right-3 top-3.5 text-slate-500 pointer-events-none"><Icons.ChevronDown /></div>
                        </div>

                        {/* Кнопка загрузки своего файла */}
                        <input type="file" accept=".txt" ref={fileInputRef} onChange={handleFileUpload} className="hidden" />
                        <button 
                          onClick={() => fileInputRef.current.click()} 
                          className="w-full py-2.5 px-4 text-xs font-semibold text-blue-300 bg-blue-900/20 hover:bg-blue-900/40 border border-blue-800/50 rounded-xl transition-colors flex items-center justify-center gap-2"
                        >
                          <Icons.Upload /> <span>Загрузить свой .txt словарь</span>
                        </button>
                      </div>

                      <button onClick={() => {setLetters(''); setMask(''); setMinLength(''); setMaxLength('');}} className="w-full py-3 text-sm font-semibold text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-700 rounded-xl transition-colors mt-2">
                        Очистить поля
                      </button>

                    </div>
                  </div>

                  {/* Правая панель - Результаты */}
                  <div className="lg:col-span-8">
                    <div className="bg-slate-900 p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-800 min-h-[500px]">
                      
                      <div className="flex items-center justify-between border-b border-slate-800 pb-4 mb-5">
                        <h2 className="text-lg font-semibold text-white flex items-center">
                          <Icons.Search /> <span className="ml-2">Слова</span>
                        </h2>
                        <div className="text-sm font-medium text-slate-400">
                          {loading ? (
                            <span className="flex items-center text-blue-400"><Icons.Loader /><span className="ml-2 hidden sm:inline">Загрузка словаря...</span></span>
                          ) : (
                            <span>{results.length > 0 ? `Найдено: ${results.length}` : `В базе: ${dictionary.length.toLocaleString('ru-RU')} слов`}</span>
                          )}
                        </div>
                      </div>

                      {error && <div className={`p-4 mb-4 text-sm rounded-xl border ${error.includes('Успешно') ? 'text-green-200 bg-green-900/30 border-green-800/50' : 'text-orange-200 bg-orange-900/30 border-orange-800/50'}`}>{error}</div>}

                      {!loading && (
                        <>
                          {(!letters.trim() && !mask.trim()) ? (
                            <div className="flex flex-col items-center justify-center py-20 text-center px-4 animate-fade-in-down">
                              <div className="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mb-4 border border-slate-700 text-slate-500"><Icons.Search /></div>
                              <h3 className="text-lg font-medium text-white mb-1">Готов к поиску</h3>
                              <p className="text-slate-400 max-w-sm text-sm">Введите ваши буквы слева или задайте маску на доске.</p>
                            </div>
                          ) : results.length === 0 ? (
                            <div className="flex flex-col items-center justify-center py-20 text-center px-4 animate-fade-in-down">
                              <h3 className="text-lg font-medium text-white mb-1">Упс, ничего не найдено</h3>
                              <p className="text-slate-400 text-sm">Попробуйте использовать джокер (*) или изменить маску.</p>
                            </div>
                          ) : (
                            <div className="flex flex-col gap-3">
                              {results.slice(0, visibleCount).map((item, index) => {
                                const isExpanded = expandedWordIdx === index;
                                return (
                                  <div key={`${item.word}-${index}`} className={`rounded-xl border transition-colors ${isExpanded ? 'bg-slate-800 border-slate-600' : 'bg-slate-900 border-slate-800 hover:border-slate-700'}`}>
                                    {/* Шапка карточки слова */}
                                    <div 
                                      className="flex items-center justify-between p-3 sm:p-4 cursor-pointer select-none"
                                      onClick={() => setExpandedWordIdx(isExpanded ? null : index)}
                                    >
                                      <div className="flex flex-wrap gap-1">
                                        {item.tiles.map((tile, i) => <GameTile key={i} char={tile.char} isJoker={tile.isJoker} className="w-7 h-7 sm:w-8 sm:h-8 text-sm" />)}
                                      </div>
                                      
                                      <div className="flex items-center space-x-3 sm:space-x-5 ml-2">
                                        <div className="flex flex-col items-center">
                                          <span className="text-[10px] uppercase font-semibold text-slate-500 tracking-wider">Букв</span>
                                          <span className="text-lg sm:text-xl font-bold text-slate-300">{item.length}</span>
                                        </div>
                                        <div className="flex flex-col items-center">
                                          <span className="text-[10px] uppercase font-semibold text-slate-500 tracking-wider">Очки</span>
                                          <span className="text-lg sm:text-xl font-bold text-white">{item.points}</span>
                                        </div>
                                        <div className="text-slate-500 ml-1">
                                          {isExpanded ? <Icons.ChevronUp /> : <Icons.ChevronDown />}
                                        </div>
                                      </div>
                                    </div>
                                    
                                    {/* Калькулятор стоимости для выбранного слова */}
                                    {isExpanded && <Calculator item={item} />}
                                  </div>
                                );
                              })}
                            </div>
                          )}

                          {results.length > visibleCount && (
                            <div className="mt-8 text-center">
                              <button onClick={() => setVisibleCount(v => v + 50)} className="px-6 py-3 bg-slate-800 border border-slate-700 text-slate-300 text-sm font-semibold rounded-xl hover:bg-slate-700 hover:text-white transition-colors">
                                Показать еще слова
                              </button>
                            </div>
                          )}
                        </>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
